databases:
  - name: budgetbeam-db
    databaseName: budgetbeam
    user: budgetbeam_user
    plan: free

services:
  - type: web
    name: budgetbeam-app
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: budgetbeam-db
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: "base64:QHXAhlCTz9dX8FkXHXqBHrNZm9nlixhBNJX93VOlHE8="
      - key: APP_DEBUG
        value: false
